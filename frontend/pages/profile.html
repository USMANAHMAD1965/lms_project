<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - LearnHub LMS</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>LearnHub LMS</span>
            </div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="#" class="active">Profile</a>
                <a href="#" id="logout-btn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>My Profile</h1>
            <p>Manage your account information</p>
        </div>

        <div class="dashboard-grid">
            <div class="dashboard-card">
                <h3><i class="fas fa-user-circle"></i> Profile Information</h3>
                <div id="profile-info" class="profile-info">
                    <div class="profile-field">
                        <strong>Name:</strong>
                        <span id="profile-name"></span>
                    </div>
                    <div class="profile-field">
                        <strong>Email:</strong>
                        <span id="profile-email"></span>
                    </div>
                    <div class="profile-field">
                        <strong>Role:</strong>
                        <span id="profile-role"></span>
                    </div>
                    <div class="profile-field">
                        <strong>Bio:</strong>
                        <span id="profile-bio"></span>
                    </div>
                </div>
                <button onclick="showEditForm()" class="auth-btn" style="margin-top: 1rem;">Edit Profile</button>
            </div>

            <div class="dashboard-card">
                <h3><i class="fas fa-edit"></i> Edit Profile</h3>
                <form id="edit-profile-form" style="display: none;">
                    <div class="form-group">
                        <label for="edit-name">Name</label>
                        <input type="text" id="edit-name" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-bio">Bio</label>
                        <textarea id="edit-bio" rows="3"></textarea>
                    </div>
                    <button type="submit" class="auth-btn">Update Profile</button>
                </form>
            </div>
        </div>
    </div>

    <div id="alert" class="alert"></div>
    <script src="../js/auth.js"></script>
    <script>
        // Check authentication
        if (!checkAuth()) return;
        
        // Load profile data
        loadProfile();
        
        // Setup logout button
        document.getElementById('logout-btn').addEventListener('click', logout);
        
        // Show edit form
        window.showEditForm = function() {
            const form = document.getElementById('edit-profile-form');
            form.style.display = 'block';
        }
        
        // Handle profile update
        document.getElementById('edit-profile-form').addEventListener('submit', updateProfile);
    </script>
</body>
</html>
